<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Clippings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Full-page drop overlay -->
  <div id="drop-overlay">
    <div class="drop-message">Drop to load clippings</div>
  </div>

  <!-- ── Upload Screen ────────────────────────────────────── -->
  <div id="upload-screen">
    <div class="upload-zone" id="upload-zone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p><strong>Drop your clippings file here</strong></p>
      <p>or <button id="browse-btn" type="button">browse to choose</button></p>
      <input type="file" id="file-input" accept=".txt" hidden>
    </div>
    <p class="upload-hint">
      Supports Kindle "My Clippings.txt" &mdash; processed entirely in your browser, nothing is uploaded.
    </p>
  </div>

  <!-- ── App (hidden until file loaded) ───────────────────── -->
  <div id="app" hidden>

    <!-- Top navigation bar -->
    <header id="app-header">
      <h1 id="app-title">My Clippings</h1>

      <div class="book-selector-wrap">
        <select id="book-select" aria-label="Select a book">
          <option value="">— Select a book —</option>
        </select>
        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <button id="load-new-btn" type="button">Load file</button>
    </header>

    <!-- Book info bar (shown after a book is selected) -->
    <div id="book-header" hidden>
      <div class="book-header-info">
        <h2 id="content-title"></h2>
        <p id="content-author"></p>
      </div>
      <span id="content-count"></span>
    </div>

    <!-- Highlights -->
    <div id="highlights-list">
      <div id="content-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <p>Select a book to read your highlights</p>
      </div>
    </div>

  </div><!-- /#app -->

  <script src="app.js"></script>
</body>
</html>
